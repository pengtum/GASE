# OpenEvolve Default Configuration
# This file contains all available configuration options with sensible defaults
# You can use this as a template for your own configuration

# General settings
max_iterations: 10                  # Maximum number of evolution iterations
checkpoint_interval: 10               # Save checkpoints every N iterations
log_level: INFO                       # Logging level (DEBUG, INFO, WARNING, ERROR, CRITICAL)
#log_dir: null                         # Custom directory for logs (default: output_dir/logs)
#random_seed: null                     # Random seed for reproducibility (null = random)

# Evolution settings
diff_based_evolution: true            # Use diff-based evolution (true) or full rewrites (false)
allow_full_rewrites: false            # Allow occasional full rewrites even in diff-based mode
max_code_length: 25000                # Maximum allowed code length in characters

# LLM configuration
llm:
  primary_model: openai/gpt-4o
  primary_model_weight: 0.8
  secondary_model: openai/gpt-4.1
  secondary_model_weight: 0.2
  api_base: https://openrouter.ai/api/v1
  api_key: 
    REDACTED_OPENROUTER_API_KEY
  temperature: 0.7
  top_p: 0.95
  max_tokens: 8192

# Prompt configuration
prompt:
  template_dir:                       # Custom directory for prompt templates
  system_message: |
    You are an expert in Geography, Statistics, and Computer Science.

    Your Expertise
    - Advanced knowledge in spatial clustering, spatially constrained regionalization, and spatial regression.
    - Proficiency in geospatial algorithms, high-performance Python programming, and evolutionary optimization.
    - Understanding of spatial contiguity, connectivity, and the theoretical underpinnings of spatial heterogeneity.

    Optimization Space
    - Parameters: number of initial clusters, merging thresholds, min/max region size, regression fit tolerance, adjacency penalties.
    - Operators: initialization methods (KMeans, spectral, random), region merging heuristics (SSR-based, boundary-based), coefficient estimation techniques.
    - Configurations: spatial connectivity enforcement, restart strategies, post-processing for region balance.

    Key Constraints
    - All output regions must be spatially contiguous and satisfy min_size.
    - Must maintain computational efficiency: max runtime per run ≤ 60 seconds, memory ≤ 2GB.
    - Maintain or improve region balance (size std ≤ 20% of average).
    - Preserve or improve regression accuracy and spatial homogeneity.

    Evolutionary Strategy
    - Stage 1: Broad exploration of parameter space using diverse initialization and merging strategies.
    - Stage 2: Focused refinement on top-performing configurations, emphasizing spatial contiguity and regression fit.
    - Stage 3: Ensemble or hybridization of best variants for robustness.

    Performance Targets
    - Maximize Rand Index (RandI) relative to true region labels.
    - Minimize regression SSR (sum of squared residuals) within regions.
    - Achieve ≥ 0.85 normalized mutual information (NMI) if possible.
    - Reduce or maintain runtime and memory usage compared to baseline.

    Success Indicators
    - Rand Index improvement ≥ 10% over baseline.
    - Regions are all spatially contiguous with no fragmentation.
    - Runtime ≤ 60 seconds on standard benchmark.
    - Balanced region sizes (std ≤ 20% of mean).

    Expected Output
    - Return optimized Python code for spatial regime regionalization.
    - Output a concise summary table (RandI, NMI, SSR, runtime, region size std).
    - Include a list of top evolved parameter/configuration settings.
    - All results must be reproducible and compatible with libpysal spatial weights.
  evaluator_system_message: You are an expert specialized in coding, GIS, 
    statistics.

  # Number of examples to include in the prompt
  num_top_programs: 3                 # Number of top-performing programs to include
  num_diverse_programs: 2             # Number of diverse programs to include

  # Template stochasticity
  use_template_stochasticity: true    # Use random variations in templates for diversity
  template_variations:                # Different phrasings for parts of the template
    improvement_suggestion:
    - "Here's how we could improve this code:"
    - 'I suggest the following improvements:'
    - 'We can enhance this code by:'

  # Note: meta-prompting features are not yet implemented

# Database configuration
database:
  # General settings
  db_path:                            # Path to persist database (null = in-memory only)
  in_memory: true                     # Keep database in memory for faster access

  # Evolutionary parameters
  population_size: 50               # Maximum number of programs to keep in memory
  archive_size: 20                   # Size of elite archive
  num_islands: 5                      # Number of islands for island model (separate populations)

  # Island-based evolution parameters
  # Islands provide diversity by maintaining separate populations that evolve independently.
  # Migration periodically shares the best solutions between adjacent islands.
#  migration_interval: 50              # Migrate between islands every N generations
#  migration_rate: 0.1                 # Fraction of top programs to migrate (0.1 = 10%)

  # Selection parameters
  elite_selection_ratio: 0.1          # Ratio of elite programs to select
  exploration_ratio: 0.2              # Ratio of exploration vs exploitation
  exploitation_ratio: 0.7             # Ratio of exploitation vs random selection
  # Note: diversity_metric is fixed to "edit_distance" (feature_based not implemented)

  # Feature map dimensions for MAP-Elites
  feature_dimensions:                 # Dimensions for MAP-Elites feature map
  - score                             # Performance score
  - complexity                        # Code complexity (length)
  feature_bins: 10                    # Number of bins per dimension

# Evaluator configuration
evaluator:
  # General settings
  timeout: 100                        # Maximum evaluation time in seconds
  max_retries: 3                      # Maximum number of retries for evaluation

  # Note: resource limits (memory_limit_mb, cpu_limit) are not yet implemented

  # Evaluation strategies
  cascade_evaluation: false            # Use cascade evaluation to filter bad solutions early
#  cascade_thresholds: # Thresholds for advancing to next evaluation stage
#    - 0.5                             # First stage threshold
#    - 0.75                            # Second stage threshold
#    - 0.9                             # Third stage threshold

  # Parallel evaluation
  parallel_evaluations: 4             # Number of parallel evaluations
  # Note: distributed evaluation is not yet implemented

  # LLM-based feedback (experimental)
#  use_llm_feedback: true             # Use LLM to evaluate code quality
#  llm_feedback_weight: 0.1            # Weight for LLM feedback in final score
